  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Outfit',sans-serif;background:#090909;color:#f0f0f0;min-height:100vh;max-width:430px;margin:0 auto;padding-bottom:60px;}
    input[type=number]{-moz-appearance:textfield;}
    input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
    #flash{position:fixed;top:52px;left:50%;transform:translateX(-50%);background:#4ade80;color:#000;padding:8px 22px;border-radius:30px;font-size:12px;font-weight:700;letter-spacing:1px;z-index:999;display:none;white-space:nowrap;}
    #loading{position:fixed;top:0;left:0;right:0;bottom:0;background:#090909;display:flex;align-items:center;justify-content:center;z-index:9999;}
    #loading span{font-size:12px;color:#333;letter-spacing:4px;text-transform:uppercase;}
    .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:9998;align-items:center;justify-content:center;}
    .modal.show{display:flex;}

    .modal-confirm{flex:1;background:#ef4444;color:#fff;border:none;border-radius:12px;padding:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;}

    .statusbar span{font-size:11px;color:#252525;letter-spacing:4px;text-transform:uppercase;}
    .hero{padding:0 22px 24px;}
    .nav-month{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;}
    .nav-btn{background:#141414;border:none;color:#555;width:38px;height:38px;border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
    .month-label{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#444;}
    .solde-bloc{text-align:center;margin-bottom:6px;}
    .solde-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#2e2e2e;margin-bottom:10px;}
    .solde-big{font-size:58px;font-weight:800;letter-spacing:-3px;line-height:1;}
    .solde-status{margin-top:10px;font-size:13px;font-weight:500;min-height:18px;}
    .progress-wrap{margin-top:20px;}
    .progress-labels{display:flex;justify-content:space-between;font-size:11px;color:#2e2e2e;margin-bottom:6px;}
    .progress-bar-bg{background:#141414;border-radius:10px;height:6px;overflow:hidden;}
    .progress-bar{height:100%;border-radius:10px;transition:width .5s;}
    .section{padding:0 14px;margin-bottom:10px;}
    .section-title{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#222;margin-bottom:8px;padding-left:4px;}
    .base-input{background:#222;border:1px solid #333;border-radius:10px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none;color:#f0f0f0;width:100%;}
    .params-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
    .param-card{background:#0f0f0f;border-radius:18px;padding:15px;border:1px solid #1a1a1a;}
    .param-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#383838;margin-bottom:5px;}

    .param-btn{width:100%;border:none;border-radius:10px;padding:9px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;margin-top:7px;}
    .btn-white{background:#f0f0f0;color:#000;}
    .btn-green{background:#4ade80;color:#000;}
    .btn-red-full{background:#1a1a1a;color:#ef4444;border:1px solid #2a1a1a;width:100%;border-radius:12px;padding:12px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:4px;}
    .budget-card{background:#0f0f0f;border-radius:18px;padding:15px 18px;border:1px solid #1a1a1a;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .budget-card-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#333;margin-bottom:3px;}
    .budget-card-val{font-size:26px;font-weight:700;}
    .budget-card-right{text-align:right;}
    .budget-card-sub{font-size:17px;font-weight:600;color:#444;}
    .week-card{background:#0e0e0e;border:1px solid #171717;border-radius:18px;padding:15px 16px;margin-bottom:10px;}
    .week-card.current{background:#0b160b;border-color:#4ade8055;}
    .week-card.future{opacity:0.65;}
    .week-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .week-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
    .week-name-wrap{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
    .week-name{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600;}
    .week-dates{font-size:12px;color:#2a2a2a;padding-left:13px;}
    .week-right{text-align:right;}
    .week-budget-init{font-size:22px;font-weight:700;color:#4ade80;}
    .week-budget-sub{font-size:11px;color:#555;margin-top:1px;}
    .week-mini-bar-bg{background:#141414;border-radius:6px;height:4px;overflow:hidden;margin-bottom:12px;}
    .week-mini-bar{height:100%;border-radius:6px;}
    .day-card{background:#0a0a0a;border-radius:12px;padding:12px;margin-bottom:8px;border:1px solid #141414;overflow:hidden;}
    .day-card.today{background:#0a140a;border-color:#4ade8033;}
    .day-card.past{opacity:0.4;}
    .day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
    .day-name{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#555;}
    .day-name.today{color:#4ade80;font-weight:700;}
    .day-right{text-align:right;}
    .day-budget{font-size:15px;font-weight:700;color:#f0f0f0;}
    .day-restant{font-size:12px;font-weight:700;margin-top:2px;}
    .day-solde-row{display:flex;align-items:center;gap:6px;width:100%;}
    .day-solde-label{font-size:11px;color:#4ade80;font-weight:600;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;width:44px;}
    .day-solde-input{flex:1;min-width:0;background:#141414;border:1px solid #252525;border-radius:8px;padding:7px 8px;font-size:15px;font-weight:700;color:#f0f0f0;font-family:inherit;outline:none;text-align:right;}
    .day-solde-input:focus{border-color:#4ade8044;}
    .day-solde-input::placeholder{color:#333;font-size:13px;font-weight:400;}
    .day-btn-ok{background:#4ade80;color:#000;border:none;border-radius:8px;width:34px;height:34px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .day-btn-x{background:#1a1a1a;color:#ef4444;border:1px solid #2a1a1a;border-radius:8px;width:34px;height:34px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .week-solde-row{display:flex;gap:8px;margin-bottom:10px;align-items:stretch;}
    .week-solde-label{flex:1;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:12px 14px;font-size:13px;font-weight:700;color:#4ade80;display:flex;align-items:center;justify-content:center;letter-spacing:1px;text-align:center;}
    .week-solde-input{flex:1;background:#141414;border:1px solid #252525;border-radius:12px;padding:12px 14px;font-size:22px;font-weight:800;color:#f0f0f0;font-family:inherit;outline:none;text-align:right;width:0;}
    .week-solde-input:focus{border-color:#4ade8055;}
    .week-solde-input::placeholder{color:#333;font-size:15px;font-weight:400;}
    .week-btn-row{display:flex;gap:8px;}
    .btn-valider{flex:2;background:#4ade80;color:#000;border:none;border-radius:12px;padding:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
    .btn-reset-sem{flex:1;background:#1a1a1a;color:#ef4444;border:1px solid #2a1a1a;border-radius:12px;padding:13px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;}
  </style>
</head>
<body>
<div id="loading"><span>Chargement…</span></div>
<div id="flash"></div>
<div id="modal-reset-mois" class="modal">
  <div class="modal-box">
    <div class="modal-title">Remettre à zéro ?</div>
    <div class="modal-sub">Toutes les données de ce mois seront effacées.</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('modal-reset-mois')">Annuler</button>
      <button class="modal-confirm" onclick="confirmResetMois()">Effacer</button>
    </div>
  </div>
</div>
<div id="modal-reset-sem" class="modal">
  <div class="modal-box">
    <div class="modal-title">Effacer la semaine ?</div>
    <div class="modal-sub">Les données de cette semaine seront effacées.</div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('modal-reset-sem')">Annuler</button>
      <button class="modal-confirm" onclick="confirmResetSem()">Effacer</button>
    </div>
  </div>
</div>
<div class="statusbar"><span>Compte</span></div>
<div class="hero">
  <div class="nav-month">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <span class="month-label" id="month-label"></span>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div class="solde-bloc">
    <div class="solde-sub">solde estimé fin de mois</div>
    <div class="solde-big" id="solde-big">—</div>
    <div class="solde-status" id="solde-status"></div>
  </div>
  <div class="progress-wrap" id="progress-wrap" style="display:none">
    <div class="progress-labels"><span id="prog-left"></span><span id="prog-right"></span></div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  </div>
</div>
<div class="section">
  <div class="section-title">Paramètres</div>
  <div class="params-grid">
    <div class="param-card">
      <div class="param-label">Départ</div>
      <div class="param-value" id="val-debut">—</div>
      <input class="base-input" type="number" id="input-debut" placeholder="Montant €" />
      <button class="param-btn btn-white" onclick="saveDebut()">OK</button>
    </div>
    <div class="param-card" id="card-objectif">
      <div class="param-label" id="label-objectif">Objectif</div>
      <div class="param-value" id="val-objectif">—</div>
      <input class="base-input" type="number" id="input-objectif" placeholder="Montant €" />
      <button class="param-btn btn-green" onclick="saveObjectif()">OK</button>
    </div>
  </div>
  <div class="budget-card" id="budget-card" style="display:none">
    <div>
      <div class="budget-card-label">Budget / jour</div>
      <div class="budget-card-val" id="budget-jour-val">—</div>
    </div>
    <div class="budget-card-right">
      <div class="budget-card-label">Marge totale</div>
      <div class="budget-card-sub" id="budget-reste">—</div>
    </div>
  </div>
  <button class="btn-red-full" onclick="openModal('modal-reset-mois')">↺ Remise à zéro du mois</button>
</div>
<div class="section" id="semaines-section" style="display:none">
  <div class="section-title">Semaines</div>
  <div id="semaines-list"></div>
</div>
<script>
const SUPABASE_URL = 'https://qwkovamgfsedcpytrimb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_CZi-2FMtg6Czewv5st-_Gg_FqotSkCZ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const GREEN = '#4ade80', ORANGE = '#fb923c', RED = '#ef4444';
const JOURS_LONG = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const JOURS_COURT = ['dim','lun','mar','mer','jeu','ven','sam'];
let yr = new Date().getFullYear();
let mo = new Date().getMonth();
let cache = {};
let resetSemIdx = null;
const TODAY = new Date();

async function loadData() {
  try {
    const { data, error } = await sb.from('budget').select('key,value');
    if (error) { console.error('Supabase:', JSON.stringify(error)); return; }
    cache = {};
    (data || []).forEach(function(r) { cache[r.key] = r.value; });
  } catch(e) { console.error('Load:', e.message); }
}

async function saveKey(key, value) {
  cache[key] = value;
  try {
    const { error } = await sb.from('budget').upsert({ key: key, value: value }, { onConflict: 'key' });
    if (error) console.error('Save:', JSON.stringify(error));
  } catch(e) { console.error('Save:', e.message); }
}

async function deleteKey(key) {
  delete cache[key];
  try { await sb.from('budget').delete().eq('key', key); }
  catch(e) { console.error('Delete:', e.message); }
}

function fmt(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}
function monthName(y, m) { return new Date(y, m, 1).toLocaleDateString('fr-FR', { month: 'long', year: 'numeric' }); }
function dowCourt(y, m, d) { return JOURS_COURT[new Date(y, m, d).getDay()]; }

function getWeekRanges(y, m) {
  const total = new Date(y, m + 1, 0).getDate();
  const firstDow = new Date(y, m, 1).getDay();
  const daysToSun = firstDow === 0 ? 0 : 7 - firstDow;
  const firstEnd = Math.min(1 + daysToSun, total);
  const ranges = [{ start: 1, end: firstEnd }];
  let d = firstEnd + 1;
  while (d <= total) { ranges.push({ start: d, end: Math.min(d + 6, total) }); d += 7; }
  return ranges;
}

function curWeekIdx(y, m) {
  const t = new Date();
  if (t.getFullYear() !== y || t.getMonth() !== m) return -1;
  return getWeekRanges(y, m).findIndex(function(r) { return t.getDate() >= r.start && t.getDate() <= r.end; });
}

function showFlash(msg, col) {
  const el = document.getElementById('flash');
  el.textContent = msg; el.style.background = col || GREEN; el.style.color = col ? '#fff' : '#000';
  el.style.display = 'block'; setTimeout(function() { el.style.display = 'none'; }, 1800);
}

function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

async function changeMonth(dir) {
  mo += dir; if (mo < 0) { mo = 11; yr--; } if (mo > 11) { mo = 0; yr++; }
  await loadData(); render();
}

async function confirmResetMois() {
  closeModal('modal-reset-mois'); await deleteKey(yr + '-' + mo);
  showFlash('Mois remis à zéro ✓'); render();
}

function openResetSem(i) { resetSemIdx = i; openModal('modal-reset-sem'); }

async function confirmResetSem() {
  closeModal('modal-reset-sem');
  if (resetSemIdx === null) return;
  const key = yr + '-' + mo;
  const rec = Object.assign({}, cache[key] || {});
  const ranges = getWeekRanges(yr, mo);
  const n = ranges.length;
  const budgetsInit = rec.budgetsInit && rec.budgetsInit.length === n ? rec.budgetsInit.slice() : Array(n).fill(null);
  const soldJours = Object.assign({}, rec.soldJours || {});
  budgetsInit[resetSemIdx] = null;
  const rng = ranges[resetSemIdx];
  for (let d = rng.start; d <= rng.end; d++) delete soldJours[yr + '-' + mo + '-' + d];
  // Aussi effacer dans l'ancien format
  if (rec.soldes) { const s = rec.soldes.slice(); s[resetSemIdx] = null; rec.soldes = s; }
  rec.budgetsInit = budgetsInit; rec.soldJours = soldJours;
  await saveKey(key, rec);
  showFlash('Semaine ' + (resetSemIdx + 1) + ' effacée ✓');
  resetSemIdx = null; render();
}

async function saveDebut() {
  const v = parseFloat(document.getElementById('input-debut').value); if (isNaN(v)) return;
  const key = yr + '-' + mo; const ranges = getWeekRanges(yr, mo); const n = ranges.length;
  const rec = { debut: v, budgetsInit: Array(n).fill(null), soldJours: {}, objectif: (cache[key] || {}).objectif || null };
  await saveKey(key, rec);
  document.getElementById('input-debut').value = ''; showFlash('Départ enregistré ✓'); render();
}

async function saveObjectif() {
  const v = parseFloat(document.getElementById('input-objectif').value); if (isNaN(v)) return;
  const key = yr + '-' + mo;
  await saveKey(key, Object.assign({}, cache[key] || {}, { objectif: v }));
  document.getElementById('input-objectif').value = ''; showFlash('Objectif enregistré ✓'); render();
}

// Normalise les données — convertit l'ancien format vers le nouveau
function normalizeSoldJours(rec, ranges) {
  const soldJours = Object.assign({}, rec.soldJours || {});
  // Compat : soldes[] = fins de semaine
  if (rec.soldes) {
    ranges.forEach(function(rng, i) {
      if (rec.soldes[i] != null) {
        const k = yr + '-' + mo + '-' + rng.end;
        if (soldJours[k] === undefined) soldJours[k] = rec.soldes[i];
      }
    });
  }
  return soldJours;
}

// Dernier solde saisi tous jours confondus
function getDernierSolde(soldJours, debutBase) {
  let solde = debutBase; let jour = 0;
  Object.keys(soldJours).forEach(function(k) {
    const d = parseInt(k.split('-')[2]);
    if (d > jour) { jour = d; solde = soldJours[k]; }
  });
  return { solde: solde, jour: jour };
}

// Dernier solde saisi AVANT un certain jour
function getSoldeAvant(soldJours, debutBase, avantJour) {
  let solde = debutBase; let jour = 0;
  Object.keys(soldJours).forEach(function(k) {
    const d = parseInt(k.split('-')[2]);
    if (d < avantJour && d > jour) { jour = d; solde = soldJours[k]; }
  });
  return solde;
}

async function validerJour(d) {
  const inp = document.getElementById('dinp-' + d); const val = parseFloat(inp.value);
  if (isNaN(val)) { showFlash('Entrez un solde', RED); return; }
  const key = yr + '-' + mo; const rec = Object.assign({}, cache[key] || {});
  const ranges = getWeekRanges(yr, mo); const n = ranges.length;
  const soldJours = Object.assign({}, rec.soldJours || {});
  soldJours[yr + '-' + mo + '-' + d] = val;
  rec.soldJours = soldJours;
  // Effacer budgetsInit des semaines suivant la semaine du jour saisi
  const weekIdx = ranges.findIndex(function(r) { return d >= r.start && d <= r.end; });
  const budgetsInit = rec.budgetsInit && rec.budgetsInit.length === n ? rec.budgetsInit.slice() : Array(n).fill(null);
  for (let j = weekIdx + 1; j < n; j++) budgetsInit[j] = null;
  rec.budgetsInit = budgetsInit;
  await saveKey(key, rec); showFlash('Jour ' + d + ' enregistré ✓'); render();
}

async function effacerJour(d) {
  const key = yr + '-' + mo; const rec = Object.assign({}, cache[key] || {});
  const soldJours = Object.assign({}, rec.soldJours || {});
  delete soldJours[yr + '-' + mo + '-' + d];
  rec.soldJours = soldJours;
  await saveKey(key, rec); showFlash('Jour ' + d + ' effacé ✓'); render();
}

async function validerSem(i) {
  const inp = document.getElementById('sinp-' + i); const val = parseFloat(inp.value);
  if (isNaN(val)) { showFlash('Entrez un solde', RED); return; }
  const key = yr + '-' + mo; const ranges = getWeekRanges(yr, mo);
  const rec = Object.assign({}, cache[key] || {});
  const soldJours = Object.assign({}, rec.soldJours || {});
  soldJours[yr + '-' + mo + '-' + ranges[i].end] = val;
  rec.soldJours = soldJours;
  // Effacer budgetsInit des semaines suivantes pour forcer recalcul
  const n = ranges.length;
  const budgetsInit = rec.budgetsInit && rec.budgetsInit.length === n ? rec.budgetsInit.slice() : Array(n).fill(null);
  for (let j = i + 1; j < n; j++) budgetsInit[j] = null;
  rec.budgetsInit = budgetsInit;
  await saveKey(key, rec); showFlash('Solde fin sem. ' + (i + 1) + ' enregistré ✓'); render();
}

function onDayInput(d) {
  const inp = document.getElementById('dinp-' + d); const val = parseFloat(inp.value);
  const restEl = document.getElementById('drest-' + d);
  if (!restEl) return;
  if (isNaN(val)) { restEl.textContent = ''; return; }
  const key = yr + '-' + mo; const rec = cache[key] || {};
  const ranges = getWeekRanges(yr, mo);
  const soldJours = normalizeSoldJours(rec, ranges);
  const debutBase = rec.debut || 0; const objectif = rec.objectif || 0;
  const totalDaysInMonth = new Date(yr, mo + 1, 0).getDate();
  const soldePrev = getSoldeAvant(soldJours, debutBase, d);
  const joursRestants = totalDaysInMonth - d;
  const budJour = joursRestants > 0 ? Math.floor(Math.max(0, soldePrev - objectif) / joursRestants) : 0;
  const dep = Math.max(0, soldePrev - val);
  const restant = budJour - dep;
  const ok = restant >= 0;
  restEl.textContent = (ok ? 'Restant ' : '-') + fmt(Math.abs(restant));
  restEl.style.color = ok ? GREEN : RED;
}

function render() {
  try {
    const key = yr + '-' + mo; const rec = cache[key] || {};
    const ranges = getWeekRanges(yr, mo); const n = ranges.length;
    const debutBase = rec.debut || 0; const objectif = rec.objectif || 0;
    const totalDaysInMonth = new Date(yr, mo + 1, 0).getDate();
    const cw = curWeekIdx(yr, mo);
    const isCurrentMonth = TODAY.getFullYear() === yr && TODAY.getMonth() === mo;
    const todayDate = TODAY.getDate();

    // Normaliser soldJours (compat ancien format)
    const soldJours = normalizeSoldJours(rec, ranges);

    // Dernier solde global
    const ds = getDernierSolde(soldJours, debutBase);
    const dernierSolde = ds.solde; const dernierJour = ds.jour;
    const joursRestantsGlobal = dernierJour > 0 ? totalDaysInMonth - dernierJour : (isCurrentMonth ? totalDaysInMonth - todayDate + 1 : totalDaysInMonth);
    const margeGlobale = Math.max(0, dernierSolde - objectif);
    const budgetJourGlobal = joursRestantsGlobal > 0 ? margeGlobale / joursRestantsGlobal : null;
    const marge = debutBase - objectif;

    // budgetsInit — figer au début de chaque semaine passée/en cours
    let budgetsInit = rec.budgetsInit && rec.budgetsInit.length === n ? rec.budgetsInit.slice() : Array(n).fill(null);
    let needsSave = false;
    ranges.forEach(function(rng, i) {
      if (budgetsInit[i] === null && (i <= cw || (!isCurrentMonth && cw === -1))) {
        const soldeAvant = getSoldeAvant(soldJours, debutBase, rng.start);
        const joursRestants = totalDaysInMonth - rng.start + 1;
        const marg = Math.max(0, soldeAvant - objectif);
        budgetsInit[i] = joursRestants > 0 ? Math.floor(marg / joursRestants * (rng.end - rng.start + 1)) : 0;
        needsSave = true;
      }
    });
    if (needsSave && debutBase > 0) {
      const newRec = Object.assign({}, cache[key] || {}, { budgetsInit: budgetsInit });
      saveKey(key, newRec);
    }

    // Header
    document.getElementById('month-label').textContent = monthName(yr, mo);
    const accent = debutBase > 0 ? (dernierSolde >= objectif ? GREEN : ORANGE) : '#3a3a3a';
    const sel = document.getElementById('solde-big');
    sel.textContent = debutBase > 0 ? fmt(dernierSolde) : '—'; sel.style.color = accent;
    const stEl = document.getElementById('solde-status');
    if (debutBase > 0 && objectif > 0) {
      if (dernierSolde > objectif) { stEl.textContent = '✓ Objectif atteint — ' + fmt(objectif); stEl.style.color = GREEN; }
      else { stEl.textContent = '⚠ Manque ' + fmt(objectif - dernierSolde) + ' pour l\'objectif'; stEl.style.color = ORANGE; }
    } else stEl.textContent = '';

    const pw = document.getElementById('progress-wrap');
    if (marge > 0) {
      pw.style.display = 'block';
      document.getElementById('prog-left').textContent = 'Dépensé ' + fmt(debutBase - dernierSolde);
      document.getElementById('prog-right').textContent = 'Marge ' + fmt(marge);
      const pb = document.getElementById('progress-bar');
      pb.style.width = Math.min(100, Math.round((debutBase - dernierSolde) / marge * 100)) + '%';
      pb.style.background = GREEN;
    } else pw.style.display = 'none';

    const vd = document.getElementById('val-debut');
    vd.textContent = rec.debut != null ? fmt(rec.debut) : '—'; vd.style.color = rec.debut != null ? '#f0f0f0' : '#252525';
    const vo = document.getElementById('val-objectif'); const lo = document.getElementById('label-objectif'); const co = document.getElementById('card-objectif');
    vo.textContent = rec.objectif != null ? fmt(rec.objectif) : '—'; vo.style.color = rec.objectif != null ? GREEN : '#252525';
    lo.style.color = rec.objectif != null ? GREEN : '#383838'; co.style.borderColor = rec.objectif != null ? GREEN + '44' : '#1a1a1a';
    const bc = document.getElementById('budget-card');
    if (budgetJourGlobal !== null && debutBase > 0) {
      bc.style.display = 'flex';
      document.getElementById('budget-jour-val').textContent = fmt(Math.floor(budgetJourGlobal));
      document.getElementById('budget-reste').textContent = fmt(marge);
    } else bc.style.display = 'none';

    // Semaines
    const secSem = document.getElementById('semaines-section');
    if (rec.debut == null) { secSem.style.display = 'none'; return; }
    secSem.style.display = 'block';
    const list = document.getElementById('semaines-list'); list.innerHTML = '';

    ranges.forEach(function(rng, i) {
      const start = rng.start; const end = rng.end; const nj = end - start + 1;
      const isCur = cw === i; const isPast = i < cw && cw !== -1; const isFut = i > cw && cw !== -1;
      const dotCol = isCur ? GREEN : (isPast ? '#2a5a2a' : '#1e1e1e');
      const nameCol = isCur ? GREEN : (isPast ? '#383838' : '#333');

      // Budget semaine figé
      const budSem = budgetsInit[i] !== null ? budgetsInit[i] : (budgetJourGlobal !== null ? Math.floor(budgetJourGlobal * nj) : null);

      // Jours pour semaine active
      let daysHtml = '';
      if (isCur) {
        let soldePrevDay = getSoldeAvant(soldJours, debutBase, start);
        // Dernier solde dans cette semaine pour budJourCommun
        let dernierSoldeSem = soldePrevDay; let dernierJourSem = start - 1;
        for (let d = start; d <= end; d++) {
          const k = yr + '-' + mo + '-' + d;
          if (soldJours[k] !== undefined) { dernierSoldeSem = soldJours[k]; dernierJourSem = d; }
        }
        const joursRestComm = totalDaysInMonth - dernierJourSem;
        const budJourCommun = joursRestComm > 0 ? Math.floor(Math.max(0, dernierSoldeSem - objectif) / joursRestComm) : 0;

        daysHtml = '<div style="margin-bottom:12px">';
        for (let d = start; d <= end; d++) {
          const dow = new Date(yr, mo, d).getDay();
          const nomJour = JOURS_LONG[dow];
          const isToday = isCurrentMonth && d === todayDate;
          const isPastDay = isCurrentMonth && d < todayDate;
          const soldJourKey = yr + '-' + mo + '-' + d;
          const soldJourVal = soldJours[soldJourKey];

          let budJour;
          if (isPastDay || isToday) {
            const jr = totalDaysInMonth - d;
            budJour = jr > 0 ? Math.floor(Math.max(0, soldePrevDay - objectif) / jr) : 0;
          } else {
            budJour = budJourCommun;
          }

          let restantHtml = '';
          if (soldJourVal !== undefined) {
            const depJour = Math.max(0, soldePrevDay - soldJourVal);
            const restantJour = budJour - depJour;
            restantHtml = '<div class="day-restant" style="color:' + (restantJour >= 0 ? GREEN : RED) + '">' +
              (restantJour >= 0 ? 'Restant ' + fmt(restantJour) : '-' + fmt(Math.abs(restantJour))) + '</div>';
            soldePrevDay = soldJourVal;
          } else {
            restantHtml = '<div id="drest-' + d + '" class="day-restant"></div>';
          }

          const cls = isToday ? 'today' : isPastDay ? 'past' : '';
          daysHtml += '<div class="day-card ' + cls + '">' +
            '<div class="day-header">' +
              '<div class="day-name ' + cls + '">' + nomJour + ' ' + d + (isToday ? ' · Aujourd\'hui' : '') + '</div>' +
              '<div class="day-right"><div class="day-budget">' + fmt(budJour) + ' / jour</div>' + restantHtml + '</div>' +
            '</div>' +
            '<div class="day-solde-row">' +
              '<div class="day-solde-label">Solde</div>' +
              '<input id="dinp-' + d + '" type="number" inputmode="decimal" class="day-solde-input" placeholder="Solde €" ' +
                'value="' + (soldJourVal !== undefined ? soldJourVal : '') + '" ' +
                'oninput="onDayInput(' + d + ')" onkeydown="if(event.key===\'Enter\')validerJour(' + d + ')" />' +
              '<button class="day-btn-ok" onclick="validerJour(' + d + ')">✓</button>' +
              '<button class="day-btn-x" onclick="effacerJour(' + d + ')">✕</button>' +
            '</div>' +
          '</div>';
        }
        daysHtml += '</div>';
      }

      const soldeDimanche = soldJours[yr + '-' + mo + '-' + end];
      const card = document.createElement('div');
      card.className = 'week-card' + (isCur ? ' current' : '') + (isFut ? ' future' : '');
      card.innerHTML =
        '<div class="week-header">' +
          '<div>' +
            '<div class="week-name-wrap">' +
              '<div class="week-dot" style="background:' + dotCol + '"></div>' +
              '<span class="week-name" style="color:' + nameCol + '">Semaine ' + (i + 1) + (isCur ? ' · en cours' : isPast ? ' · passée' : '') + '</span>' +
            '</div>' +
            '<div class="week-dates">' + dowCourt(yr, mo, start) + ' ' + start + ' → ' + dowCourt(yr, mo, end) + ' ' + end + ' · ' + nj + 'j</div>' +
          '</div>' +
          '<div class="week-right">' +
            '<div class="week-budget-init">' + (budSem !== null ? fmt(budSem) : '—') + '</div>' +
            '<div class="week-budget-sub">budget sem.</div>' +
          '</div>' +
        '</div>' +
        daysHtml +
        '<div class="week-solde-row">' +
          '<div class="week-solde-label">Solde fin sem.</div>' +
          '<input id="sinp-' + i + '" type="number" inputmode="decimal" class="week-solde-input" placeholder="Solde €" ' +
            'value="' + (soldeDimanche !== undefined ? soldeDimanche : '') + '" ' +
            'onkeydown="if(event.key===\'Enter\')validerSem(' + i + ')" />' +
        '</div>' +
        '<div class="week-btn-row">' +
          '<button class="btn-valider" onclick="validerSem(' + i + ')">✓ Valider fin sem.</button>' +
          '<button class="btn-reset-sem" onclick="openResetSem(' + i + ')">↺ Reset</button>' +
        '</div>';
      list.appendChild(card);
    });
  } catch(e) {
    console.error('Render error:', e);
  }
}

(async function() {
  await loadData();
  document.getElementById('loading').style.display = 'none';
  render();
})();
</script>
</body>
</html>
